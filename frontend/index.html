<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 50px;
            width: 350px;
            text-align: center;
        }

        input, select, button {
            padding: 10px;
            margin: 8px 0;
            width: 90%;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            margin: 5px 0;
            padding: 10px;
            border-radius: 8px;
        }

        canvas {
            margin-top: 20px;
        }

        #insight {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>💸 Expense Tracker</h1>

    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">

    <select id="category">
        <option value="Food">🍔 Food</option>
        <option value="Travel">🚗 Travel</option>
        <option value="Shopping">🛍 Shopping</option>
        <option value="Bills">💡 Bills</option>
        <option value="Other">📦 Other</option>
    </select>

    <button onclick="addExpense()">Add Expense</button>

    <h2>Total: ₹<span id="total">0</span></h2>

    <ul id="list"></ul>

    <!-- Chart -->
    <canvas id="chart" width="300" height="300"></canvas>

    <!-- AI Insight -->
    <h3>🤖 AI Insight:</h3>
    <p id="insight">No insights yet</p>
</div>

<script>
    let total = 0;

    let categoryData = {
        Food: 0,
        Travel: 0,
        Shopping: 0,
        Bills: 0,
        Other: 0
    };

    let chart;

    function addExpense() {
        let desc = document.getElementById("desc").value;
        let amount = parseInt(document.getElementById("amount").value);
        let category = document.getElementById("category").value;

        if (!desc || !amount) return;

        total += amount;
        document.getElementById("total").innerText = total;

        // update category data
        categoryData[category] += amount;

        let li = document.createElement("li");
        li.innerText = `${category} | ${desc} - ₹${amount}`;
        document.getElementById("list").appendChild(li);

        updateChart();
        generateInsight();

        // clear inputs
        document.getElementById("desc").value = "";
        document.getElementById("amount").value = "";
    }

    function updateChart() {
        let ctx = document.getElementById("chart").getContext("2d");

        if (chart) {
            chart.destroy();
        }

        chart = new Chart(ctx, {
            type: "pie",
            data: {
                labels: Object.keys(categoryData),
                datasets: [{
                    data: Object.values(categoryData)
                }]
            }
        });
    }

    function generateInsight() {
        let maxCategory = "";
        let maxAmount = 0;

        for (let category in categoryData) {
            if (categoryData[category] > maxAmount) {
                maxAmount = categoryData[category];
                maxCategory = category;
            }
        }

        let message = "Your spending looks balanced 👍";

        if (maxAmount > 0) {
            message = `You are spending the most on ${maxCategory}`;
        }

        // Smart rule
        if (categoryData["Food"] > total * 0.4) {
            message = "⚠️ You are overspending on Food!";
        }

        document.getElementById("insight").innerText = message;
    }
</script>

</body>
</html>
