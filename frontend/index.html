<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker - Notion Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for consistent coloring */
        :root {
            --bg-color: #191919;
            --text-color: #FFFFFF;
            --secondary-text: #9B9B9B;
            --hover-bg: #2C2C2C;
            --border-color: #313131;
            --emoji-bg: #FFEBCD;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
        }

        .tracker-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Title Styling */
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Instructions Toggle Section */
        .instructions-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--secondary-text);
            margin-bottom: 20px;
        }

        .arrow-icon {
            margin-right: 10px;
            font-size: 0.8em;
        }

        .maintain-k {
            background-color: var(--hover-bg);
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* The Expense Table Structure */
        .table-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .view-options {
            display: flex;
            gap: 15px;
        }

        .view-btn {
            background: none;
            border: none;
            color: var(--secondary-text);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .view-btn.active {
            color: var(--text-color);
            background-color: var(--hover-bg);
        }

        .view-btn:hover:not(.active) {
            background-color: #262626;
        }

        /* Notion-Style Grid Table */
        .expense-table {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr; /* Matches the layout in image 1 */
            width: 100%;
            border-collapse: collapse;
        }

        .table-header {
            display: contents;
            font-weight: 600;
            color: var(--secondary-text);
            font-size: 0.9em;
        }

        .table-header .header-cell {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .expense-row {
            display: contents;
        }

        .expense-row .cell {
            padding: 12px 10px;
            border-bottom: 1px solid #262626;
            transition: background 0.3s;
        }

        .expense-row:hover .cell {
            background-color: #202020;
        }

        /* Styling the specific data cells */
        .cell-amount {
            font-family: 'Inter', sans-serif;
            text-align: right;
            color: #A0FFA0; /* Light green for amounts */
        }

        .cell-date {
            color: var(--secondary-text);
            text-align: right;
        }

    </style>
</head>
<body>

<div class="tracker-container">
    <h1>Daily Expense Tracker</h1>

    <div class="instructions-toggle">
        <div class="instructions-header">
            <span class="arrow-icon">&#9660;</span>
            <h2>Instructions</h2>
        </div>
        <div class="instructions-content">
            <p class="maintain-k">MAINTAIN BELOW 5K <span style="font-size: 1.2em;">😋</span></p>
        </div>
    </div>

    <div class="2025-expenses-view">
        <div class="table-view-header">
            <div class="view-options">
                <button class="view-btn active">All</button>
                <button class="view-btn">Category</button>
                <button class="view-btn">Calendar</button>
                <button class="view-btn">1 more...</button>
            </div>
            <button class="view-btn" style="border: 1px solid var(--border-color);">New</button>
        </div>

        <div class="expense-table">
            <div class="table-header">
                <div class="header-cell">Aa Detail</div>
                <div class="header-cell cell-amount"># Amount</div>
                <div class="header-cell cell-date">📅 Date</div>
            </div>

            <div class="expense-row">
                <div class="cell">Auto</div>
                <div class="cell cell-amount">₹120.00</div>
                <div class="cell cell-date">March 1, 2026</div>
            </div>

            </div>
    </div>
</div>

<script>
    // Optional: Add simple interactivity for the instructions toggle
    const toggleHeader = document.querySelector('.instructions-header');
    const toggleContent = document.querySelector('.instructions-content');
    const arrow = document.querySelector('.arrow-icon');

    toggleHeader.addEventListener('click', () => {
        const isVisible = toggleContent.style.display !== 'none';
        toggleContent.style.display = isVisible ? 'none' : 'block';
        arrow.innerHTML = isVisible ? '&#9654;' : '&#9660;'; // Change arrow direction
    });
</script>

</body>
</html>
